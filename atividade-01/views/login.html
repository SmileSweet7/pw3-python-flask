{% extends 'base.html' %}
{% block content %}
    <!-- HEADER SIMPLES -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="fab fa-playstation"></i>
                <span>PlayStation Store</span>
            </div>
            <div class="user-actions">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">
        <h1 class="page-title">Bem-vindo a Playstation Store!</h1>
        <h3 class="page-subtitle">Digite seus dados aqui!</h3>
        <hr>

        <!-- CARD DO FORMULÁRIO COM 4 NOVAS PERGUNTAS -->
        <div class="form-card ps-decoration">
            <!-- PERGUNTA 1: NOME -->
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-gamepad"></i>
                    Nome:
                </label>
                <input type="text" class="form-input" placeholder="Digite o seu nome">
            </div>

            <!-- PERGUNTA 2: SUA IDADE -->
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-star"></i>
                    Sua idade:
                </label>
                <input type="text" class="form-input" placeholder="Ex: 10, 50, 100, etc">
            </div>

            <!-- PERGUNTA 3: SEU EMAIL -->
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-pencil-alt"></i>
                    Seu email:
                </label>
                <textarea class="form-textarea" placeholder="Digite seu email"></textarea>
            </div>

            <!-- PERGUNTA 4: SUA SENHA -->
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-pencil-alt"></i>
                    Sua senha:
                </label>
                <textarea class="form-textarea" placeholder="Digite sua senha"></textarea>
            </div>


            

            <!-- ÍCONE DECORATIVO PLAYSTATION (APENAS VISUAL) -->
            <div style="text-align: center; margin-top: 20px; opacity: 0.3;">
                <i class="fab fa-playstation" style="font-size: 40px; color: var(--ps-blue);"></i>
            </div>
        </div>

        <!-- CONTAINER APENAS COM OS DOIS BOTÕES SOLICITADOS -->
        <div class="buttons-container">
            <!-- BOTÃO 1: HOME PAGE (/) -->
            <a href="/" class="btn btn-home">
                <i class="fas fa-home"></i>
                Página Inicial
            </a>
            
            <!-- BOTÃO 2: PÁGINA /lista -->
            <a href="/lista" class="btn btn-lista">
                <i class="fas fa-list"></i>
                Lista de Jogos
            </a>
             <a href="/formulario" class="btn btn-formulario">
                <i class="fas fa-formulario"></i>
                Formulario
            </a>
        </div>
    </main>

    <!-- FOOTER SIMPLES -->
    <footer class="footer">
        <p>&copy; 2024 Sony Interactive Entertainment Inc. Todos os direitos reservados.</p>
        <p style="margin-top: 10px;">Questionário - PlayStation Store</p>
    </footer>
{% endblock content %}
